<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>앱 목록 게시판</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(180deg, #167684 0%, #7ed6d3 100%);
      color: #222;
      font-family: 'Noto Sans KR', sans-serif;
      margin: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: none;
    }
    .container { max-width: 930px; margin: 40px auto; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(51,88,244,.10); padding: 40px 32px; position:relative; z-index:1; }
    .nav { background: #fff; border-bottom: 1.5px solid #e2e8f4; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; box-shadow: 0 2px 8px rgba(51,88,244,.04); }
    .nav-logo { font-weight: 800; font-size: 1.1rem; color: #3358f4; letter-spacing: -0.02em; }
    .nav-menu { display: flex; gap: 24px; }
    .nav-menu a { color: #4a567a; text-decoration: none; font-size: .95rem; font-weight: 500; transition: color .15s; }
    .nav-menu a:hover { color: #3358f4; }
    h1 { font-size: 1.6rem; color: #3358f4; margin-bottom: 8px; }
    .subtitle { color: #8893b0; font-size: 1.05rem; margin-bottom: 28px; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    thead { background: #f4f6fb; }
    th, td { padding: 14px 10px; text-align: left; }
    th { color: #4a567a; font-size: .98rem; border-bottom: 2px solid #e2e8f4; }
    tr { border-bottom: 1px solid #e2e8f4; }
    td { font-size: .97rem; color: #222; }
    .app-title { font-weight: 700; color: #3358f4; }
    .desc { color: #4a567a; font-size: .96rem; }
    .date { color: #8893b0; font-size: .93rem; }
    .btn { background: #3358f4; color: #fff; border: none; border-radius: 8px; padding: 7px 18px; font-size: .95rem; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn:hover { background: #223a99; }
    @media (max-width: 960px) {
      .container { max-width: 98vw; padding: 18px 4vw; }
      .nav { padding: 0 12px; }
      th, td { padding: 10px 4px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">AppList <span style="color:#0ec7a5;">Board</span></div>
    <div class="nav-menu">
      <a href="#">홈</a>
      <a href="#">소개</a>
      <a href="#">문의</a>
    </div>
  </nav>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
      <h1 style="margin-bottom:0;display:flex;align-items:center;gap:16px;">
        앱 목록 게시판
        <span id="verInfo" style="font-size:.98rem;font-weight:500;color:#8893b0;"></span>
      </h1>
      <a href="app-add.html" class="btn" style="padding:9px 20px;font-size:.98rem;">+ 앱 추가</a>
    </div>
    <div class="subtitle">최신 앱과 도구를 한눈에 확인하고 바로 이동하세요.</div>
    <table>
      <thead>
        <tr>
          <th>앱 이름</th>
          <th>설명</th>
          <th>등록일</th>
          <th>바로가기</th>
          <th>삭제</th>
        </tr>
      </thead>
      <tbody id="appTbody">
        <!-- 앱 목록이 여기에 동적으로 렌더링됩니다. -->
      </tbody>
    </table>
    <script>
      // 버전 자동증가 및 날짜 표시
      (function(){
        const verKey = 'appListVer';
        let ver = parseInt(localStorage.getItem(verKey)||'0',10);
        ver = isNaN(ver) ? 1 : ver+1;
        localStorage.setItem(verKey, ver);
        const today = new Date();
        const y = today.getFullYear();
        const m = ('0'+(today.getMonth()+1)).slice(-2);
        const d = ('0'+today.getDate()).slice(-2);
        document.addEventListener('DOMContentLoaded', function(){
          const el = document.getElementById('verInfo');
          if(el) el.textContent = `Ver ${ver} (${y}-${m}-${d})`;
        });
      })();
      // 기본 앱 목록 (초기 3개)
      const defaultApps = [
        {name:'데일리 브리핑',desc:'오늘의 주요 이슈, 날씨, 증시를 한눈에!',url:'ai-briefing.html',date:'2026-03-24'},
        {name:'전과목 시험지 생성기',desc:'중학교 전과목 AI 자동 시험지 생성',url:'exam_generator.html',date:'2026-03-23'},
        {name:'한문 문제지',desc:'한문 퀴즈 및 문제지 자동 생성',url:'hanja_quiz_v2.html',date:'2026-03-23'}
      ];
      function renderApps() {
        let apps = [];
        try {
          apps = JSON.parse(localStorage.getItem('apps')||'[]');
        } catch(e) { apps = []; }
        if (!apps.length) apps = defaultApps;
        const tbody = document.getElementById('appTbody');
        tbody.innerHTML = '';
        apps.forEach((app, idx) => {
          tbody.innerHTML += `<tr><td class="app-title"><a href="app-add.html?edit=${idx}" style="color:#3358f4;text-decoration:underline;cursor:pointer;">${app.name}</a></td><td class="desc">${app.desc}</td><td class="date">${app.date}</td><td><a href="${app.url}" class="btn">이동</a></td><td><button class="btn" style="background:#ef4444;" onclick="deleteApp(${idx})">삭제</button></td></tr>`;
        });
      }
      function deleteApp(idx) {
        let apps = [];
        try {
          apps = JSON.parse(localStorage.getItem('apps')||'[]');
        } catch(e) { apps = []; }
        if (!apps.length) return;
        apps.splice(idx, 1);
        localStorage.setItem('apps', JSON.stringify(apps));
        renderApps();
      }
      renderApps();
    </script>
  </div>
</body>
</html>
