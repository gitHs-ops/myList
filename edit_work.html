<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>작업 내용 수정 — 개발 일지</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body{background:#f4f6fb;color:#0f1729;font-family:'Noto Sans KR',sans-serif;margin:0;}
    .container{max-width:480px;margin:60px auto 0 auto;padding:40px 24px 32px 24px;background:#fff;border-radius:18px;box-shadow:0 8px 32px rgba(51,88,244,.10);}
    h1{font-size:1.4rem;font-weight:900;margin-bottom:28px;text-align:center;letter-spacing:-.02em;}
    form{display:flex;flex-direction:column;gap:18px;}
    label{font-size:.98rem;font-weight:700;margin-bottom:6px;}
    input[type="text"],input[type="file"]{padding:12px 14px;font-size:1rem;border:1.5px solid #e2e8f4;border-radius:8px;font-family:inherit;background:#f0f3fa;transition:border-color .15s;}
    input[type="text"]:focus{border-color:#3358f4;outline:none;}
    .file-link{margin-top:4px;display:inline-block;font-size:.92rem;color:#3358f4;text-decoration:underline;}
    .btns{display:flex;gap:12px;justify-content:center;margin-top:18px;}
    button{background:#3358f4;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 2px 12px rgba(51,88,244,.10);transition:opacity .15s,transform .15s;}
    button:hover{opacity:.88;transform:translateY(-1px);}
    .btn-cancel{background:#e2e8f4;color:#4a567a;}
    @media(max-width:600px){.container{padding:18px 2vw;}}
  </style>
</head>
<body>
  <div class="container">
    <h1>작업 내용 수정</h1>
    <form id="editForm" autocomplete="off" enctype="multipart/form-data">
      <div>
        <label for="editContent">작업 내용</label>
        <input type="text" id="editContent" maxlength="200" required>
      </div>
      <div>
        <label for="editFile">문서 파일</label>
        <input type="file" id="editFile">
        <div id="currentFile"></div>
      </div>
      <div class="btns">
        <button type="submit">저장</button>
        <button type="button" class="btn-cancel" onclick="window.location.href='day_work_report.html'">취소</button>
      </div>
    </form>
  </div>
  <script>
    // idx 파라미터 추출
    function getIdx() {
      const params = new URLSearchParams(window.location.search);
      return params.get('idx');
    }
    const idx = getIdx();
    if(idx === null) {
      alert('잘못된 접근입니다.');
      window.location.href = 'day_work_report.html';
    }
    const STORAGE_KEY = 'workList';
    function loadList() {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    }
    function saveList(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }
    // 폼에 기존 데이터 채우기
    const list = loadList();
    if(!list[idx]) {
      alert('존재하지 않는 항목입니다.');
      window.location.href = 'day_work_report.html';
    }
    const item = list[idx];
    document.getElementById('editContent').value = item.content;
    if(item.fileName && item.fileUrl) {
      document.getElementById('currentFile').innerHTML = `<a href="${item.fileUrl}" target="_blank" class="file-link">현재 파일: ${item.fileName}</a>`;
    }
    // 저장
    document.getElementById('editForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const content = document.getElementById('editContent').value.trim();
      const fileInput = document.getElementById('editFile');
      if(!content) return;
      // 파일이 새로 선택된 경우
      if(fileInput.files && fileInput.files[0]) {
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = function(evt) {
          list[idx].content = content;
          list[idx].fileName = file.name;
          list[idx].fileUrl = evt.target.result;
          saveList(list);
          window.location.href = 'day_work_report.html';
        };
        reader.readAsDataURL(file);
        return;
      }
      // 파일 변경 없을 때
      list[idx].content = content;
      saveList(list);
      window.location.href = 'day_work_report.html';
    });
  </script>
</body>
</html>
