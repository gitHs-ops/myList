<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 가계부</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --surface2: #f7f9ff;
  --border: #dde3f5;
  --primary: #3a57e8;
  --primary-light: #eef1ff;
  --primary-dark: #2a46d4;
  --accent: #0aad8e;
  --warn: #f59e0b;
  --danger: #ef4444;
  --text: #0d1b3e;
  --sub: #3d4f7c;
  --muted: #8090b8;
  --red: #e05252;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
  --shadow: 0 2px 12px rgba(44,79,212,.08);
  --shadow-lg: 0 6px 32px rgba(44,79,212,.13);
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:linear-gradient(180deg,#167684 0%,#7ed6d3 100%); color:var(--text); font-family:var(--sans); min-height:100vh; }

/* ── HEADER ── */
.app-header {
  background:var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex; align-items:center; justify-content:space-between;
  box-shadow: var(--shadow);
  position: sticky; top:0; z-index:100;
}
.header-left { display:flex; align-items:center; gap:12px; }
.header-icon {
  width:40px; height:40px; border-radius:10px;
  background:linear-gradient(135deg,var(--primary),#7b5fff);
  display:flex; align-items:center; justify-content:center; font-size:1.2rem;
}
.header-title { font-size:1.1rem; font-weight:900; color:var(--text); }
.header-count { font-size:.8rem; color:var(--muted); font-family:var(--mono); }
.title-wrapper { position:relative; display:flex; align-items:center; gap:5px; }
.title-dropdown-btn {
  background:transparent; border:none; cursor:pointer;
  color:var(--primary); font-size:1.5rem; padding:0 4px;
  line-height:1; transition:color .15s;
}
.title-dropdown-btn:hover { background:var(--primary-light); }
.title-dropdown {
  display:none; position:absolute; top:calc(100% + 10px); left:0;
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; box-shadow:var(--shadow-lg);
  min-width:200px; z-index:500; overflow:hidden;
}
.title-dropdown.open { display:block; animation:fadeIn .15s ease; }
.title-dropdown-item {
  padding:11px 16px; font-size:.87rem; font-weight:600;
  cursor:pointer; color:var(--sub); transition:background .12s;
  border-bottom:1px solid var(--border);
}
.title-dropdown-item:last-child { border-bottom:none; }
.title-dropdown-item:hover { background:var(--surface2); }
.title-dropdown-item.active { color:var(--primary); background:var(--primary-light); }
.title-dropdown-item.new-book { color:var(--accent); font-weight:700; }

/* ── SUMMARY CARDS ── */
.summary-section { padding: 20px 32px 0; }
.summary-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr;
  gap: 12px;
}
.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: var(--shadow);
}
.sum-card-label { font-size:.72rem; color:var(--muted); margin-bottom:8px; font-weight:500; }
.sum-card-val {
  font-size:1.7rem; font-weight:900; color:var(--text);
  display:flex; align-items:baseline; gap:4px;
}
.sum-unit { font-size:.85rem; font-weight:500; color:var(--sub); }
.sum-card.card-date .sum-card-val { font-size:1.4rem; color:var(--primary); }

/* ── FILTER BAR ── */
.filter-section { padding: 18px 32px 0; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.filter-label { font-size:.8rem; color:var(--muted); font-weight:600; margin-right:4px; }
.filter-btn {
  padding:7px 16px; border-radius:999px;
  border: 1.5px solid var(--border);
  background: var(--surface); color:var(--sub);
  font-family:var(--sans); font-size:.82rem; font-weight:600;
  cursor:pointer; transition:all .15s;
}
.filter-btn:hover { border-color:var(--primary); color:var(--primary); }
.filter-btn.active {
  background:var(--primary); border-color:var(--primary);
  color:#fff; box-shadow:0 2px 10px rgba(58,87,232,.3);
}
.filter-select {
  display:none;
  padding:8px 12px; border-radius:10px;
  border:1.5px solid var(--border); background:var(--surface);
  font-family:var(--sans); font-size:.88rem; font-weight:600;
  color:var(--text); cursor:pointer;
}

/* ── MAIN TABLE AREA ── */
.table-section { padding: 18px 32px 60px; }
.table-wrap {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  overflow-x:auto;
  overflow-y:hidden;
  box-shadow:var(--shadow);
  -webkit-overflow-scrolling:touch;
}
.t-head, .t-row { min-width:960px; }

/* ── TABLE HEAD ── */
.t-head {
  background:linear-gradient(135deg, var(--primary), var(--primary-dark));
  display:grid;
  grid-template-columns: 100px 100px 100px 110px 90px 100px 110px 100px 1fr;
  padding: 14px 20px;
}
.th {
  font-size:.82rem; font-weight:700; color:#fff;
  text-align:right;
}
.th:first-child { text-align:left; }
.th.th-detail { text-align:left; padding-left:16px; }

/* ── YEAR GROUP ── */
.year-group { border-bottom: 1px solid var(--border); }
.year-header {
  padding:10px 20px;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
}
.year-dot { width:8px; height:8px; border-radius:50%; background:var(--red); }
.year-label { font-size:.88rem; font-weight:700; color:var(--text); }

/* ── TABLE ROW ── */
.t-row {
  display:grid;
  grid-template-columns: 100px 100px 100px 110px 90px 100px 110px 100px 1fr;
  padding:0 20px;
  border-bottom:1px solid var(--border);
  align-items:start;
  transition:background .12s;
}
.t-row:last-child { border-bottom:none; }
.t-row:hover { background:var(--surface2); }

.td {
  padding:14px 0;
  font-size:.88rem; color:var(--sub);
  text-align:right;
}
.td:first-child { text-align:left; }
.td.td-month {
  font-size:.95rem; font-weight:700; color:var(--red);
  padding-top:16px;
}
.td.td-amount {
  font-weight:600; color:var(--text);
}
.td.td-dash { color:var(--muted); }
.td.td-detail { text-align:left; padding-left:16px; padding-top:12px; }

/* ── DETAIL TAGS ── */
.detail-toggle {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:6px;
  padding:4px 10px;
  font-size:.72rem; font-weight:600; color:var(--sub);
  cursor:pointer;
  transition:all .15s;
  margin-bottom:8px;
}
.detail-toggle:hover { border-color:var(--primary); color:var(--primary); }
.detail-toggle .arrow { font-size:.65rem; transition:transform .2s; }
.detail-toggle.open .arrow { transform:rotate(180deg); }

.detail-tags {
  display:flex; flex-wrap:wrap; gap:6px;
  margin-top:4px; margin-bottom:10px;
  overflow:hidden;
  max-height:0; transition:max-height .25s ease;
}
.detail-tags.show { max-height:200px; }
.d-tag {
  display:inline-block;
  background:var(--primary-light);
  border:1px solid rgba(58,87,232,.18);
  border-radius:6px;
  padding:3px 10px;
  font-size:.72rem; font-weight:600; color:var(--primary);
  white-space:nowrap;
}
.d-tag.red { background:#fff0f0; border-color:#fca5a5; color:var(--red); }
.d-tag.green { background:#f0fdf4; border-color:#86efac; color:#16a34a; }
.d-tag.yellow { background:#fffbeb; border-color:#fcd34d; color:#d97706; }

/* ── ADD/EDIT MODAL ── */
.modal-overlay {
  position:fixed; inset:0; z-index:300;
  background:rgba(13,27,62,.45); backdrop-filter:blur(6px);
  display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background:var(--surface); border-radius:18px;
  width:100%; max-width:480px;
  max-height:90vh; display:flex; flex-direction:column;
  box-shadow:0 24px 64px rgba(0,0,0,.18);
  animation:slideUp .25s ease; overflow:hidden;
}
@keyframes slideUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
.modal-header {
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.modal-title { font-size:1rem; font-weight:800; }
.modal-close {
  width:30px; height:30px; border-radius:7px;
  border:1.5px solid var(--border); background:transparent;
  font-size:1rem; cursor:pointer; color:var(--muted);
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.modal-close:hover { border-color:var(--danger); color:var(--danger); }
.modal-body { padding:20px 24px; overflow-y:auto; flex:1; }
.form-group { margin-bottom:16px; }
.form-label { font-size:.78rem; font-weight:700; color:var(--sub); display:block; margin-bottom:6px; }
.form-input, .form-select {
  width:100%; padding:10px 14px;
  border:1.5px solid var(--border); border-radius:9px;
  font-family:var(--sans); font-size:.87rem; color:var(--text);
  background:var(--surface2); outline:none;
  transition:border-color .15s;
}
.form-input:focus, .form-select:focus { border-color:var(--primary); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-hint { font-size:.72rem; color:var(--muted); margin-top:5px; }
.detail-input-wrap { display:flex; flex-direction:column; gap:6px; }
.detail-input-row { display:flex; gap:6px; }
.detail-input-row .form-input { flex:1; }
.btn-add-detail {
  padding:9px 14px; border:1.5px dashed var(--border); border-radius:8px;
  background:transparent; color:var(--muted); font-family:var(--sans);
  font-size:.8rem; cursor:pointer; transition:all .15s; text-align:center;
}
.btn-add-detail:hover { border-color:var(--primary); color:var(--primary); }
.btn-del-detail {
  padding:9px 12px; border:1px solid var(--border); border-radius:7px;
  background:transparent; color:var(--muted); cursor:pointer; font-size:.85rem;
  transition:all .15s; flex-shrink:0;
}
.btn-del-detail:hover { border-color:var(--danger); color:var(--danger); }
.modal-footer {
  padding:14px 24px 20px; display:flex; gap:10px;
  border-top:1px solid var(--border);
}
.btn-save {
  flex:1; background:var(--primary); color:#fff; border:none;
  border-radius:10px; padding:12px; font-family:var(--sans);
  font-size:.9rem; font-weight:700; cursor:pointer;
  transition:opacity .15s;
}
.btn-save:hover { opacity:.88; }
.btn-cancel {
  background:transparent; border:1.5px solid var(--border);
  border-radius:10px; padding:12px 20px; font-family:var(--sans);
  font-size:.9rem; font-weight:600; color:var(--sub); cursor:pointer;
  transition:all .15s;
}
.btn-cancel:hover { border-color:var(--primary); color:var(--primary); }

/* ── FAB ── */
.fab {
  position:fixed; bottom:28px; right:28px;
  width:52px; height:52px; border-radius:50%;
  background:var(--primary); color:#fff; border:none;
  font-size:1.4rem; cursor:pointer;
  box-shadow:0 4px 20px rgba(58,87,232,.4);
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s, box-shadow .15s;
  z-index:200;
}
.fab:hover { transform:scale(1.08); box-shadow:0 6px 28px rgba(58,87,232,.5); }

/* ── ROW ACTION BUTTONS ── */
.t-row { position:relative; }
.row-actions {
  display:none;
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  gap:6px; align-items:center;
  z-index:10;
}
.t-row:hover .row-actions { display:flex; }
.btn-row {
  width:30px; height:30px; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:.85rem; cursor:pointer; border:1.5px solid;
  transition:all .15s; background:var(--surface);
}
.btn-row-edit { border-color:var(--border); color:var(--primary); }
.btn-row-edit:hover { background:var(--primary-light); border-color:var(--primary); }
.btn-row-del { border-color:var(--border); color:var(--danger); }
.btn-row-del:hover { background:#fff0f0; border-color:var(--danger); }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
  background:#1e293b; color:#fff;
  padding:10px 20px; border-radius:10px; font-size:.83rem;
  opacity:0; transition:all .3s; pointer-events:none; z-index:999;
  white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── CONFIRM MODAL ── */
.confirm-modal {
  background:var(--surface); border-radius:16px;
  width:100%; max-width:360px;
  box-shadow:0 24px 64px rgba(0,0,0,.18);
  animation:slideUp .22s ease; overflow:hidden;
  padding:28px 28px 22px;
  text-align:center;
}
.confirm-icon { font-size:2rem; margin-bottom:10px; }
.confirm-title { font-size:1rem; font-weight:800; margin-bottom:8px; }
.confirm-desc { font-size:.85rem; color:var(--sub); line-height:1.7; margin-bottom:22px; }
.confirm-btns { display:flex; gap:10px; }
.btn-confirm-del {
  flex:1; background:var(--danger); color:#fff; border:none;
  border-radius:9px; padding:11px; font-family:var(--sans);
  font-size:.88rem; font-weight:700; cursor:pointer; transition:opacity .15s;
}
.btn-confirm-del:hover { opacity:.88; }
.btn-confirm-cancel {
  flex:1; background:transparent; border:1.5px solid var(--border);
  border-radius:9px; padding:10px; font-family:var(--sans);
  font-size:.88rem; font-weight:600; color:var(--sub); cursor:pointer;
  transition:all .15s;
}
.btn-confirm-cancel:hover { border-color:var(--primary); color:var(--primary); }

/* ── HEADER ADD BTN ── */
.btn-header-add {
  display:flex; align-items:center; gap:6px;
  background:var(--primary); color:#fff; border:none;
  border-radius:9px; padding:8px 18px;
  font-family:var(--sans); font-size:.82rem; font-weight:700;
  cursor:pointer; box-shadow:0 2px 10px rgba(58,87,232,.28);
  transition:opacity .15s, transform .1s;
}
.btn-header-add:hover { opacity:.88; transform:translateY(-1px); }

/* ── EMPTY ── */
.empty-row {
  padding:48px 20px; text-align:center; color:var(--muted);
  font-size:.88rem;
}

/* ── COLUMN EDITOR ── */
.btn-col-edit {
  padding:7px 14px; border-radius:9px;
  border:1.5px solid var(--border);
  background:var(--surface); color:var(--sub);
  font-family:var(--sans); font-size:.8rem; font-weight:600;
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.btn-col-edit:hover { border-color:var(--primary); color:var(--primary); }
.col-editor-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.col-editor-row .form-input { flex:1; }
.modal-app-title {
  text-align:center; font-size:1.1rem; font-weight:900;
  color:var(--primary); padding-bottom:14px;
  border-bottom:1px solid var(--border); margin-bottom:16px;
}

@media(max-width:900px) {
  .summary-grid { grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:6px; }
  .sum-card { padding:10px 8px; }
  .sum-card-label { font-size:.62rem; margin-bottom:4px; }
  .sum-card-val { font-size:1rem; }
  .sum-card.card-date .sum-card-val { font-size:.9rem; }
  .sum-unit { font-size:.7rem; }
  .app-header,.summary-section,.filter-section,.table-section { padding-left:16px; padding-right:16px; }
  .t-head,.t-row { font-size:.78rem; }
  .filter-btn { display:none; }
  .filter-select { display:block; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="header-left">
    <div class="header-icon">🪙</div>
    <div class="title-wrapper">
      <div class="header-title" id="appTitleEl">나의 가계부</div>
      <button class="title-dropdown-btn" onclick="toggleTitleDropdown()" title="가계부 전환">▾</button>
      <div class="title-dropdown" id="titleDropdown"></div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="header-count" id="totalCount">총 0건</div>
    <button class="btn-col-edit" onclick="openColEditor()">⚙ 항목 편집</button>
    <button class="btn-header-add" onclick="openAddModal()">＋ 추가입력</button>
  </div>
</div>

<!-- SUMMARY CARDS -->
<div class="summary-section">
  <div class="summary-grid" id="summaryGrid"></div>
</div>

<!-- FILTER -->
<div class="filter-section" id="filterSection">
  <span class="filter-label">연도 필터</span>
</div>

<!-- TABLE -->
<div class="table-section">
  <div class="table-wrap">
    <div class="t-head" id="tHead"></div>
    <div id="tableBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmOverlay" onclick="closeConfirmOutside(event)">
  <div class="confirm-modal">
    <div class="confirm-icon">🗑</div>
    <div class="confirm-title">항목을 삭제하시겠어요?</div>
    <div class="confirm-desc" id="confirmDesc">이 작업은 되돌릴 수 없습니다.</div>
    <div class="confirm-btns">
      <button class="btn-confirm-del" onclick="confirmDelete()">삭제하기</button>
      <button class="btn-confirm-cancel" onclick="closeConfirm()">취소</button>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()" title="추가입력">＋</button>

<!-- COLUMN EDITOR MODAL -->
<div class="modal-overlay" id="colEditorOverlay" onclick="closeColEditorOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">헤더 항목 편집</div>
      <button class="modal-close" onclick="closeColEditor()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">타이틀</label>
        <input class="form-input" type="text" id="fAppTitle" placeholder="나의 가계부">
      </div>
      <div class="form-label" style="margin-bottom:8px;margin-top:4px;">헤더 항목</div>
      <div id="colEditorList"></div>
      <button class="btn-add-detail" onclick="addColRow()" style="margin-top:8px;width:100%;">+ 항목 추가</button>
    </div>
    <div class="modal-footer">
      <button class="btn-save" onclick="saveColEditor()">저장하기</button>
      <button class="btn-cancel" onclick="closeColEditor()">취소</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">추가입력</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-app-title" id="modalAppTitle">나의 가계부</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">연도</label>
          <select class="form-select" id="fYear"></select>
        </div>
        <div class="form-group">
          <label class="form-label">월</label>
          <select class="form-select" id="fMonth">
            <option>1</option><option>2</option><option>3</option><option>4</option>
            <option>5</option><option>6</option><option>7</option><option>8</option>
            <option>9</option><option>10</option><option>11</option><option>12</option>
          </select>
        </div>
      </div>
      <div id="colInputs"></div>
      <div class="form-group">
        <label class="form-label">세부내역</label>
        <div class="detail-input-wrap" id="detailInputs">
          <div class="detail-input-row">
            <input class="form-input" type="text" placeholder="예: 카뱅 서브 50만">
            <button class="btn-del-detail" onclick="removeDetail(this)">−</button>
          </div>
        </div>
        <button class="btn-add-detail" onclick="addDetailInput()" style="margin-top:8px;">+ 세부내역 추가</button>
        <div class="form-hint">// 각 항목을 별도 태그로 표시합니다</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-save" onclick="saveEntry()">저장하기</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// 데이터 (스크린샷 기반 초기 데이터)
// ════════════════════════════════════════

const DEFAULT_COLUMNS = [
  { key:'kb',      label:'카뱅' },
  { key:'kbm',     label:'국민' },
  { key:'deposit', label:'정기예금' },

];
let COLUMNS = DEFAULT_COLUMNS.map(c=>({...c}));

// ── 멀티 워크스페이스 ──────────────────
let BOOKS = [];
let CURRENT_BOOK_ID = null;
let newBookMode = false;

function saveData() {
  try { localStorage.setItem(`hb_data_${CURRENT_BOOK_ID}`, JSON.stringify(DATA)); } catch(e){}
}
function saveColumns() {
  try { localStorage.setItem(`hb_cols_${CURRENT_BOOK_ID}`, JSON.stringify(COLUMNS)); } catch(e){}
}
function saveWorkspace() {
  const idx = BOOKS.findIndex(b=>b.id===CURRENT_BOOK_ID);
  if(idx>=0) BOOKS[idx].title = APP_TITLE;
  try { localStorage.setItem('hb_workspace', JSON.stringify({current:CURRENT_BOOK_ID, books:BOOKS})); } catch(e){}
}

function loadWorkspace() {
  try {
    const wsRaw = localStorage.getItem('hb_workspace');
    if(wsRaw) {
      const ws = JSON.parse(wsRaw);
      BOOKS = ws.books || [];
      CURRENT_BOOK_ID = ws.current;
      const book = BOOKS.find(b=>b.id===CURRENT_BOOK_ID);
      if(book) APP_TITLE = book.title;
      const savedCols = localStorage.getItem(`hb_cols_${CURRENT_BOOK_ID}`);
      if(savedCols) COLUMNS = JSON.parse(savedCols);
      const savedData = localStorage.getItem(`hb_data_${CURRENT_BOOK_ID}`);
      if(savedData) DATA = JSON.parse(savedData);
    } else {
      // 기존 데이터 마이그레이션
      const id = 'book_' + Date.now();
      const savedTitle = localStorage.getItem('hb_title');
      if(savedTitle) APP_TITLE = savedTitle;
      const savedCols = localStorage.getItem('hb_columns');
      if(savedCols) COLUMNS = JSON.parse(savedCols);
      if(localStorage.getItem('hb_version') === '5') {
        const savedData = localStorage.getItem('hb_data');
        if(savedData) DATA = JSON.parse(savedData);
      }
      BOOKS = [{id, title: APP_TITLE}];
      CURRENT_BOOK_ID = id;
      localStorage.setItem('hb_workspace', JSON.stringify({current:id, books:BOOKS}));
      localStorage.setItem(`hb_data_${id}`, JSON.stringify(DATA));
      localStorage.setItem(`hb_cols_${id}`, JSON.stringify(COLUMNS));
    }
  } catch(e){}
}

  if(id === CURRENT_BOOK_ID) { closeTitleDropdown(); return; }
  saveData();
  CURRENT_BOOK_ID = id;
  localStorage.setItem('hb_workspace', JSON.stringify({current:id, books:BOOKS}));
  const book = BOOKS.find(b=>b.id===id);
  APP_TITLE = book ? book.title : '가계부';
  const savedCols = localStorage.getItem(`hb_cols_${id}`);
  COLUMNS = savedCols ? JSON.parse(savedCols) : DEFAULT_COLUMNS.map(c=>({...c}));
  const savedData = localStorage.getItem(`hb_data_${id}`);
  DATA = savedData ? JSON.parse(savedData) : [];
  currentFilter = 'all';
  closeTitleDropdown();
  applyAppTitle();
  render();
}

function renderTitleDropdown() {
  const dd = document.getElementById('titleDropdown');
  dd.innerHTML = '';
  BOOKS.forEach(book=>{
    const item = document.createElement('div');
    item.className = 'title-dropdown-item' + (book.id===CURRENT_BOOK_ID?' active':'');
    item.textContent = book.title;
    item.onclick = ()=>switchBook(book.id);
    dd.appendChild(item);
  });
  const newItem = document.createElement('div');
  newItem.className = 'title-dropdown-item new-book';
  newItem.textContent = '＋ 새 타이틀';
  newItem.onclick = ()=>{ closeTitleDropdown(); createNewBook(); };
  dd.appendChild(newItem);
}

function toggleTitleDropdown() {
  const dd = document.getElementById('titleDropdown');
  if(dd.classList.contains('open')) { dd.classList.remove('open'); }
  else { renderTitleDropdown(); dd.classList.add('open'); }
}
function closeTitleDropdown() {
  document.getElementById('titleDropdown').classList.remove('open');
}
function createNewBook() {
  newBookMode = true;
  openColEditor();
}

// ── 렌더링 ────────────────────────────
function render() {
  updateSummary();
  renderFilters();
  renderTable();
  document.getElementById('totalCount').textContent = `총 ${DATA.length}건`;
}

function updateSummary() {
  const grid = document.getElementById('summaryGrid');
  if(DATA.length === 0) { grid.innerHTML=''; return; }
  const sorted = [...DATA].sort((a,b)=> b.year*100+b.month - (a.year*100+a.month));
  const latest = sorted[0];
  grid.style.gridTemplateColumns = `1.4fr ${COLUMNS.map(()=>'1fr').join(' ')}`;
  grid.innerHTML = `
    <div class="sum-card card-date">
      <div class="sum-card-label">최근 월</div>
      <div class="sum-card-val">${latest.year}/${latest.month}</div>
    </div>
    ${COLUMNS.map(col=>`
    <div class="sum-card">
      <div class="sum-card-label">${col.label}</div>
      <div class="sum-card-val"><span>${latest[col.key]??'—'}</span><span class="sum-unit">${latest[col.key]!=null?' 만':''}</span></div>
    </div>`).join('')}`;
}

function renderFilters() {
  const years = [...new Set(DATA.map(d=>d.year))].sort((a,b)=>b-a);
  const sec = document.getElementById('filterSection');
  sec.innerHTML = `<span class="filter-label">연도 필터</span>`;
  // 버튼 (데스크탑)
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn' + (currentFilter==='all'?' active':'');
  allBtn.textContent = '전체';
  allBtn.onclick = ()=>{ currentFilter='all'; render(); };
  sec.appendChild(allBtn);
  years.forEach(y=>{
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (currentFilter==y?' active':'');
    btn.textContent = String(y);
    btn.onclick = ()=>{ currentFilter=y; render(); };
    sec.appendChild(btn);
  });
  // 드롭다운 (모바일)
  const sel = document.createElement('select');
  sel.className = 'filter-select';
  const allOpt = document.createElement('option');
  allOpt.value = 'all'; allOpt.textContent = '전체';
  sel.appendChild(allOpt);
  years.forEach(y=>{
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y+'년';
    sel.appendChild(opt);
  });
  sel.value = currentFilter;
  sel.onchange = ()=>{ currentFilter = sel.value==='all' ? 'all' : parseInt(sel.value); render(); };
  sec.appendChild(sel);
}

function renderTable() {
  const gridCols = `100px ${COLUMNS.map(()=>'100px').join(' ')} 100px 1fr`;
  const minW = (100 + COLUMNS.length * 100 + 300) + 'px';
  // t-head 동적 렌더링
  const tHead = document.getElementById('tHead');
  tHead.style.gridTemplateColumns = gridCols;
  tHead.style.minWidth = minW;
  tHead.innerHTML = `<div class="th">년 / 월</div>
    ${COLUMNS.map(col=>`<div class="th">${col.label}</div>`).join('')}
    <div class="th">합계</div>
    <div class="th th-detail">세부내역</div>`;

  const body = document.getElementById('tableBody');
  body.innerHTML = '';
  const filtered = currentFilter==='all'
    ? [...DATA]
    : DATA.filter(d=>d.year==currentFilter);
  if(filtered.length===0){
    body.innerHTML = '<div class="empty-row">📭 표시할 데이터가 없습니다. + 버튼으로 추가하세요.</div>';
    return;
  }
  filtered.sort((a,b)=> b.year*100+b.month - (a.year*100+a.month));
  const byYear = {};
  filtered.forEach(d=>{
    if(!byYear[d.year]) byYear[d.year]=[];
    byYear[d.year].push(d);
  });
  Object.keys(byYear).sort((a,b)=>b-a).forEach(year=>{
    const grp = document.createElement('div');
    grp.className = 'year-group';
    grp.innerHTML = `<div class="year-header"><span class="year-dot"></span><span class="year-label">${year}년</span></div>`;
    byYear[year].forEach(row=>{
      const r = document.createElement('div');
      r.className = 't-row';
      r.style.gridTemplateColumns = gridCols;
      r.style.minWidth = minW;
      const detailsHtml = buildDetailHtml(row);
      const sum = COLUMNS.reduce((a,col)=>a+(row[col.key]??0),0);
      r.innerHTML = `
        <div class="td td-month">${row.month}월</div>
        ${COLUMNS.map(col=>`<div class="td td-amount">${row[col.key]!=null?row[col.key]+'만':'—'}</div>`).join('')}
        <div class="td td-amount" style="font-weight:700;">${sum>0?sum+'만':'—'}</div>
        <div class="td td-detail">${detailsHtml}</div>
        <div class="row-actions">
          <button class="btn-row btn-row-edit" title="편집" onclick="openEditModal(${row.id})">✏️</button>
          <button class="btn-row btn-row-del" title="삭제" onclick="openConfirm(${row.id})">🗑</button>
        </div>`;
      grp.appendChild(r);
    });
    body.appendChild(grp);
  });
}

function buildDetailHtml(row) {
  if(!row.details || row.details.length===0) return '<span style="color:var(--muted);font-size:.8rem;">—</span>';
  const uid = `detail-${row.id}`;
  const tags = row.details.map(d=>`<span class="d-tag">${d}</span>`).join('');
  return `
    <div class="detail-toggle" id="toggle-${uid}" onclick="toggleDetail('${uid}')">
      <span>내역 ${row.details.length}건</span>
      <span class="arrow">▼</span>
    </div>
    <div class="detail-tags" id="${uid}">${tags}</div>`;
}

function toggleDetail(uid) {
  const tags = document.getElementById(uid);
  const toggle = document.getElementById(`toggle-${uid}`);
  tags.classList.toggle('show');
  toggle.classList.toggle('open');
}

// ── 모달 ─────────────────────────────
function buildColInputs(row) {
  const wrap = document.getElementById('colInputs');
  wrap.innerHTML = '';
  for(let i=0; i<COLUMNS.length; i+=2) {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'form-row';
    [COLUMNS[i], COLUMNS[i+1]].filter(Boolean).forEach(col=>{
      const grp = document.createElement('div');
      grp.className = 'form-group';
      const val = row ? (row[col.key] ?? '') : '';
      grp.innerHTML = `
        <label class="form-label">${col.label} (만원)</label>
        <input class="form-input" type="number" data-key="${col.key}" placeholder="0" value="${val}">`;
      rowDiv.appendChild(grp);
    });
    wrap.appendChild(rowDiv);
  }
}

function openAddModal() {
  editId = null;
  document.getElementById('modalTitle').textContent = '추가입력';
  document.getElementById('fYear').value = new Date().getFullYear();
  document.getElementById('fMonth').value = new Date().getMonth()+1;
  buildColInputs(null);
  document.getElementById('detailInputs').innerHTML = `
    <div class="detail-input-row">
      <input class="form-input" type="text" placeholder="예: 카뱅 서브 50만">
      <button class="btn-del-detail" onclick="removeDetail(this)">−</button>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function openEditModal(id) {
  const row = DATA.find(d=>d.id===id);
  if(!row) return;
  editId = id;
  document.getElementById('modalTitle').textContent = `${row.year}년 ${row.month}월 편집`;
  document.getElementById('fYear').value = row.year;
  document.getElementById('fMonth').value = row.month;
  buildColInputs(row);
  // 세부내역
  const di = document.getElementById('detailInputs');
  di.innerHTML = '';
  (row.details||[]).forEach(d=>{
    di.innerHTML += `<div class="detail-input-row">
      <input class="form-input" type="text" value="${d.replace(/"/g,'&quot;')}" placeholder="예: 카뱅 서브 50만">
      <button class="btn-del-detail" onclick="removeDetail(this)">−</button>
    </div>`;
  });
  if(di.children.length===0) {
    di.innerHTML = `<div class="detail-input-row">
      <input class="form-input" type="text" placeholder="예: 카뱅 서브 50만">
      <button class="btn-del-detail" onclick="removeDetail(this)">−</button>
    </div>`;
  }
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function addDetailInput() {
  const di = document.getElementById('detailInputs');
  const row = document.createElement('div');
  row.className = 'detail-input-row';
  row.innerHTML = `<input class="form-input" type="text" placeholder="예: 핀트 20만">
    <button class="btn-del-detail" onclick="removeDetail(this)">−</button>`;
  di.appendChild(row);
}
function removeDetail(btn) {
  const row = btn.closest('.detail-input-row');
  if(row) row.remove();
}

function saveEntry() {
  const year = parseInt(document.getElementById('fYear').value);
  const month = parseInt(document.getElementById('fMonth').value);
  const colData = {};
  document.querySelectorAll('#colInputs [data-key]').forEach(inp=>{
    colData[inp.dataset.key] = inp.value !== '' ? parseFloat(inp.value) : null;
  });
  const details = [...document.querySelectorAll('#detailInputs .form-input')]
    .map(i=>i.value.trim()).filter(v=>v);

  const wasEdit = editId !== null;
  if(wasEdit) {
    const idx = DATA.findIndex(d=>d.id===editId);
    DATA[idx] = { ...DATA[idx], year, month, ...colData, details };
  } else {
    const newId = DATA.length ? Math.max(...DATA.map(d=>d.id))+1 : 1;
    DATA.push({ id:newId, year, month, ...colData, details });
  }
  saveData();
  closeModal();
  render();
  showToast(wasEdit ? '✅ 항목이 수정되었습니다.' : '✅ 새 항목이 등록되었습니다.');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}
function closeModalOutside(e) {
  if(e.target===document.getElementById('modalOverlay')) closeModal();
}

// ── 삭제 확인 ────────────────────────
let deleteTargetId = null;
function openConfirm(id) {
  const row = DATA.find(d=>d.id===id);
  if(!row) return;
  deleteTargetId = id;
  document.getElementById('confirmDesc').textContent =
    `${row.year}년 ${row.month}월 항목을 삭제합니다. 이 작업은 되돌릴 수 없습니다.`;
  document.getElementById('confirmOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function confirmDelete() {
  if(deleteTargetId===null) return;
  DATA = DATA.filter(d=>d.id!==deleteTargetId);
  saveData();
  closeConfirm();
  render();
  showToast('🗑 항목이 삭제되었습니다.');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
  document.body.style.overflow='';
  deleteTargetId = null;
}
function closeConfirmOutside(e) {
  if(e.target===document.getElementById('confirmOverlay')) closeConfirm();
}

// ── 컬럼 편집 ────────────────────────
function openColEditor() {
  document.getElementById('fAppTitle').value = newBookMode ? '' : APP_TITLE;
  document.querySelector('#colEditorOverlay .modal-title').textContent =
    newBookMode ? '새 가계부 만들기' : '헤더 항목 편집';
  const list = document.getElementById('colEditorList');
  list.innerHTML = '';
  COLUMNS.forEach(col=>{
    const row = document.createElement('div');
    row.className = 'col-editor-row';
    const newKey = newBookMode ? 'c' + Date.now() + Math.random() : col.key;
    row.innerHTML = `
      <input class="form-input col-editor-input" type="text" value="${col.label}" data-key="${newKey}" placeholder="항목명">
      <button class="btn-del-detail" onclick="removeColRow(this)" title="삭제">−</button>`;
    list.appendChild(row);
  });
  document.getElementById('colEditorOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeColEditor() {
  document.getElementById('colEditorOverlay').classList.remove('open');
  document.body.style.overflow='';
}
function closeColEditorOutside(e) {
  if(e.target===document.getElementById('colEditorOverlay')) closeColEditor();
}
function addColRow() {
  const list = document.getElementById('colEditorList');
  const row = document.createElement('div');
  row.className = 'col-editor-row';
  const newKey = 'c' + Date.now();
  row.innerHTML = `
    <input class="form-input col-editor-input" type="text" value="" data-key="${newKey}" placeholder="항목명">
    <button class="btn-del-detail" onclick="removeColRow(this)" title="삭제">−</button>`;
  list.appendChild(row);
}
function removeColRow(btn) {
  btn.closest('.col-editor-row').remove();
}
function saveColEditor() {
  const titleVal = document.getElementById('fAppTitle').value.trim();
  const rows = document.querySelectorAll('#colEditorList .col-editor-row');
  const newCols = [];
  rows.forEach(row=>{
    const inp = row.querySelector('.col-editor-input');
    const label = inp.value.trim();
    const key = inp.dataset.key;
    if(label) newCols.push({ key, label });
  });

  if(newBookMode) {
    const id = 'book_' + Date.now();
    const title = titleVal || '새 가계부';
    saveData(); // 현재 책 저장
    BOOKS.push({id, title});
    CURRENT_BOOK_ID = id;
    APP_TITLE = title;
    COLUMNS = newCols.length ? newCols : DEFAULT_COLUMNS.map(c=>({...c}));
    DATA = [];
    currentFilter = 'all';
    localStorage.setItem(`hb_cols_${id}`, JSON.stringify(COLUMNS));
    localStorage.setItem(`hb_data_${id}`, JSON.stringify(DATA));
    localStorage.setItem('hb_workspace', JSON.stringify({current:id, books:BOOKS}));
    newBookMode = false;
    closeColEditor();
    applyAppTitle();
    render();
    showToast('✅ 새 가계부가 생성되었습니다.');
  } else {
    if(titleVal) APP_TITLE = titleVal;
    if(newCols.length) COLUMNS = newCols;
    saveColumns();
    saveWorkspace();
    closeColEditor();
    applyAppTitle();
    render();
    showToast('✅ 저장되었습니다.');
  }
}

// ── 토스트 ────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

// ── 초기화 ───────────────────────────
(function initYearSelect() {
  const sel = document.getElementById('fYear');
  const cur = new Date().getFullYear();
  for (let y = cur + 20; y >= cur - 20; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    sel.appendChild(opt);
  }
})();
loadWorkspace();
render();
applyAppTitle();
document.addEventListener('click', e=>{
  const wrapper = document.querySelector('.title-wrapper');
  if(wrapper && !wrapper.contains(e.target)) closeTitleDropdown();
});
</script>
</body>
</html>
