<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개발 일지 목록 — DailyBrief</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f4f6fb;--bg2:#ffffff;--surface:#ffffff;--surface2:#f0f3fa;
      --border:#e2e8f4;--primary:#3358f4;--primary2:#5b7fff;
      --accent:#0ec7a5;--warn:#f59e0b;--danger:#ef4444;
      --text:#0f1729;--sub:#4a567a;--muted:#8893b0;
      --mono:'DM Mono',monospace;--sans:'Noto Sans KR',sans-serif;
      --shadow:0 4px 24px rgba(51,88,244,.10);
      --shadow-lg:0 12px 48px rgba(28, 31, 40, 0.14);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden;}
    .container{
      max-width:900px;margin:60px auto 0 auto;padding:40px 24px 60px 24px;
      background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);
    }
    h1{
      font-size:2.1rem;font-weight:900;margin-bottom:32px;text-align:center;letter-spacing:-.02em;
    }
    .add-form{
      display:flex;gap:12px;margin-bottom:32px;justify-content:center;align-items:center;
    }
    .add-form input[type="text"]{
      flex:1;min-width:0;padding:12px 14px;font-size:1rem;border:1.5px solid var(--border);
      border-radius:8px;font-family:var(--sans);background:var(--surface2);transition:border-color .15s;
    }
    .add-form input[type="text"]:focus{border-color:var(--primary);outline:none;}
    .add-form button{
      background:var(--primary);color:#fff;border:none;border-radius:8px;padding:12px 28px;
      font-family:var(--sans);font-size:1rem;font-weight:700;cursor:pointer;box-shadow:var(--shadow);
      transition:opacity .15s,transform .15s;
    }
    .add-form button:hover{opacity:.88;transform:translateY(-1px);}
    table{
      width:100%;border-collapse:collapse;background:var(--surface2);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
    th,td{
      padding:14px 10px;text-align:left;font-size:.98rem;
    }
    th{
      background:var(--bg2);color:var(--primary);font-weight:800;border-bottom:2px solid var(--border);}
    td{border-bottom:1px solid var(--border);color:var(--sub);}
    tr:last-child td{border-bottom:none;}
    .delete-btn{
      background:var(--danger);color:#fff;border:none;border-radius:6px;padding:7px 16px;
      font-size:.92rem;font-weight:700;cursor:pointer;transition:opacity .15s;}
    .delete-btn:hover{opacity:.7;}
    @media(max-width:960px){
      .container{padding:24px 4vw;}
      h1{font-size:1.3rem;}
      th,td{font-size:.92rem;padding:10px 6px;}
    }
  </style>
</head>
<body>
  <div class="container">
      <!-- 파일 미리보기 모달 -->
      <div id="fileModal" style="display:none;position:fixed;z-index:9999;left:0;top:0;width:100vw;height:100vh;background:rgba(20,24,40,0.38);align-items:center;justify-content:center;">
        <div style="background:#fff;max-width:700px;width:90vw;max-height:80vh;overflow:auto;border-radius:14px;box-shadow:0 8px 32px rgba(51,88,244,.18);padding:32px 24px;position:relative;">
          <button id="closeModalBtn" style="position:absolute;top:12px;right:18px;font-size:1.3rem;background:none;border:none;color:#888;cursor:pointer;">✕</button>
          <div id="fileModalTitle" style="font-weight:700;font-size:1.08rem;margin-bottom:18px;color:var(--primary);"></div>
          <div id="fileModalContent" style="white-space:pre-wrap;font-family:inherit;font-size:1rem;color:#222;"></div>
        </div>
      </div>
    <h1 id="pageTitle">개발 일지 목록</h1>
    <form class="add-form" id="addForm" autocomplete="off" enctype="multipart/form-data">
      <input type="text" id="workInput" placeholder="작업 내용을 입력하세요" required maxlength="200">
      <input type="file" id="fileInput" style="flex:1;min-width:0;">
      <button type="submit">등록</button>
    </form>
    <table>
      <thead>
        <tr>
          <th style="width:120px">등록일시</th>
          <th>작업 내용</th>
          <th style="width:120px">문서 파일</th>
          <th style="width:80px">삭제</th>
        </tr>
      </thead>
      <tbody id="workList"></tbody>
    </table>
  </div>
  <script>
    // LocalStorage key
    const STORAGE_KEY = 'dayWorkReportList';
    // Load list from localStorage
    function loadList() {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    }
    // Save list to localStorage
    function saveList(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }
    // Version/date logic
    function getTodayStr() {
      const d = new Date();
      return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
    }
    function getVersion() {
      const verKey = 'dayWorkReportVer';
      const dateKey = 'dayWorkReportVerDate';
      const today = getTodayStr();
      let ver = localStorage.getItem(verKey);
      let vdate = localStorage.getItem(dateKey);
      if (!ver || !vdate || vdate !== today) {
        ver = '1.0';
        vdate = today;
      } else {
        ver = (parseFloat(ver) + 0.1).toFixed(1);
      }
      localStorage.setItem(verKey, ver);
      localStorage.setItem(dateKey, vdate);
      return ver;
    }
    function setPageTitle() {
      const ver = getVersion();
      const today = getTodayStr();
      document.getElementById('pageTitle').textContent = `개발 일지 목록  ver ${ver} (${today})`;
    }
    // Render list
    function renderList() {
      setPageTitle();
      const list = loadList();
      const tbody = document.getElementById('workList');
      tbody.innerHTML = '';
      if(list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#b0b8c9;padding:32px 0;">등록된 작업이 없습니다</td></tr>';
        return;
      }
      list.forEach((item, idx) => {
        const tr = document.createElement('tr');
        // 작업 내용 클릭 시 수정 화면 이동 (edit page: edit_work.html?idx=...)
        let fileCell = '';
        if (item.fileName && item.fileUrl) {
          const ext = item.fileName.split('.').pop().toLowerCase();
          const viewable = ['txt','html','htm','md','csv','json','js','css'];
          if (viewable.includes(ext)) {
            fileCell = `<a href="#" class="view-file" data-idx="${idx}" style="color:var(--primary)">${item.fileName}</a>`;
          } else {
            fileCell = `<a href="${item.fileUrl}" target="_blank" rel="noopener" download="${item.fileName}">${item.fileName}</a>`;
          }
        }
        tr.innerHTML = `
          <td>${item.date}</td>
          <td><a href="#" class="edit-link" data-idx="${idx}" style="color:var(--primary);text-decoration:underline;cursor:pointer;">${item.content}</a></td>
          <td>${fileCell}</td>
          <td><button class="delete-btn" data-idx="${idx}">삭제</button></td>
        `;
        tbody.appendChild(tr);
      });
    }
    // Add new work
    document.getElementById('addForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const input = document.getElementById('workInput');
      const fileInput = document.getElementById('fileInput');
      const content = input.value.trim();
      if(!content) return;
      const today = new Date();
      const dateStr = today.getFullYear() + '.' + String(today.getMonth()+1).padStart(2,'0') + '.' + String(today.getDate()).padStart(2,'0') + ' ' + String(today.getHours()).padStart(2,'0') + ':' + String(today.getMinutes()).padStart(2,'0') + ':' + String(today.getSeconds()).padStart(2,'0');
      let fileName = '', fileUrl = '';
      if(fileInput.files && fileInput.files[0]) {
        const file = fileInput.files[0];
        fileName = file.name;
        // 파일을 base64로 저장 (로컬 저장소 한계 내에서)
        const reader = new FileReader();
        reader.onload = function(evt) {
          fileUrl = evt.target.result;
          const list = loadList();
          list.unshift({date: dateStr, content, fileName, fileUrl});
          saveList(list);
          input.value = '';
          fileInput.value = '';
          renderList();
        };
        reader.readAsDataURL(file);
        return;
      }
      // 파일 없을 때 바로 저장
      const list = loadList();
      list.unshift({date: dateStr, content, fileName, fileUrl});
      saveList(list);
      input.value = '';
      fileInput.value = '';
      renderList();
    });
    // Delete work & file view & edit
    document.getElementById('workList').addEventListener('click', function(e) {
      if(e.target.classList.contains('delete-btn')) {
        const idx = e.target.getAttribute('data-idx');
        const list = loadList();
        list.splice(idx,1);
        saveList(list);
        renderList();
      }
      // 작업 내용 클릭 시 수정 화면 이동
      if(e.target.classList.contains('edit-link')) {
        const idx = e.target.getAttribute('data-idx');
        window.location.href = `edit_work.html?idx=${idx}`;
      }
      // 텍스트/HTML 파일 보기 (모달)
      if(e.target.classList.contains('view-file')) {
        e.preventDefault();
        const idx = e.target.getAttribute('data-idx');
        const list = loadList();
        const item = list[idx];
        if(item && item.fileUrl && item.fileName) {
          const ext = item.fileName.split('.').pop().toLowerCase();
          fetch(item.fileUrl)
            .then(res => res.text())
            .then(text => {
              const modal = document.getElementById('fileModal');
              const contentDiv = document.getElementById('fileModalContent');
              const titleDiv = document.getElementById('fileModalTitle');
              titleDiv.textContent = item.fileName;
              if(ext === 'html' || ext === 'htm') {
                // HTML은 iframe으로 렌더링
                contentDiv.innerHTML = `<iframe srcdoc="${text.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}" style="width:100%;height:60vh;border:none;"></iframe>`;
              } else {
                contentDiv.textContent = text;
              }
              modal.style.display = 'flex';
            });
        }
      }
        // 모달 닫기 버튼
        document.getElementById('closeModalBtn').onclick = function() {
          document.getElementById('fileModal').style.display = 'none';
          document.getElementById('fileModalContent').innerHTML = '';
          document.getElementById('fileModalTitle').textContent = '';
        };
        // 모달 바깥 클릭 시 닫기
        document.getElementById('fileModal').onclick = function(e) {
          if(e.target === this) {
            this.style.display = 'none';
            document.getElementById('fileModalContent').innerHTML = '';
            document.getElementById('fileModalTitle').textContent = '';
          }
        };
    });
    // Initial render
    renderList();
  </script>
</body>
</html>
